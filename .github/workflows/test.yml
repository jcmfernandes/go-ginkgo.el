name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Emacs build is selected in devenv.nix via $EMACS_PKG:
        #   emacs29 -> 29.4 (pinned nixos-24.05; the declared floor)
        #   emacs30 -> 30.x (current stable)
        emacs:
          - emacs29
          - emacs30
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          # Avoid GitHub API rate limits when resolving flake inputs.
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/cachix-action@v15
        with:
          # Public cache of prebuilt devenv binaries (read-only, no auth).
          name: devenv

      - name: Install devenv
        run: nix profile install nixpkgs#devenv

      - name: Run the CI gate in the devenv shell
        env:
          EMACS_PKG: ${{ matrix.emacs }}
        # `ci` (defined in devenv.nix): install the Go tree-sitter grammar,
        # then `make all` (compile + checkdoc + test) with the matrix Emacs.
        run: devenv shell -- ci
