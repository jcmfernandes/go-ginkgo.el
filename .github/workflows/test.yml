name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs-version:
          - '29.1'
          - '29.4'
          - '30.1'
          - snapshot
    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Byte-compile (warnings are errors)
        run: make compile

      - name: Checkdoc
        run: make checkdoc

      - name: Install Go tree-sitter grammar
        # Best-effort: the tree-sitter tests skip themselves if this fails.
        run: make grammar || true

      - name: Run tests
        run: make test
