name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read" # actions/checkout reads the repo
      checks: "write" # mikepenz/action-junit-report publishes a check run
    strategy:
      fail-fast: false
      matrix:
        # Emacs build is selected in devenv.nix via $EMACS_PKG:
        #   emacs29 -> 29.4 (pinned nixos-24.05; the declared floor)
        #   emacs30 -> 30.x (current stable)
        emacs:
          - "emacs29"
          - "emacs30"
    steps:
      - uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0

      - uses: "cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3" # v31.10.6
        with:
          # Avoid GitHub API rate limits when resolving flake inputs.
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - uses: "cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71" # v17
        with:
          # Public cache of prebuilt devenv binaries (read-only, no auth).
          name: "devenv"

      - name: "Install devenv"
        run: |
          nix profile add nixpkgs#devenv

      - uses: "HatsuneMiku3939/direnv-action@5fe57fa0cfa35641b8dcbb724b39b613f32080d7" # v1.3.7

      - name: "Run the CI gate in the devenv shell"
        env:
          EMACS_PKG: ${{ matrix.emacs }}
          # Make ERT emit a JUnit report (test/go-ginkgo-test.xml) for the
          # reporter step below; supported by both Emacs 29 and 30.
          EMACS_TEST_JUNIT_REPORT: "1"
        # Run each phase of the gate (install the Go tree-sitter grammar, then
        # compile + checkdoc + test) inside the devenv shell with the matrix
        # Emacs.  Each phase is wrapped in a GitHub Actions log group so the
        # test results read like a separate step.
        run: |
          devenv shell -- bash -euo pipefail -c '
            echo "::group::Install the Go tree-sitter grammar" ; make grammar  ; echo "::endgroup::"
            echo "::group::Byte-compile"                        ; make compile  ; echo "::endgroup::"
            echo "::group::Checkdoc"                            ; make checkdoc ; echo "::endgroup::"
            echo "::group::Run the ERT test suite"              ; make test     ; echo "::endgroup::"
          '

      - name: "Publish the ERT test report"
        # Render test/go-ginkgo-test.xml (emitted by ERT above) as a check run
        # with per-test results and annotations on failures.  `!cancelled()`
        # keeps it publishing when the suite fails.
        uses: "mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16" # v6.4.2
        if: ${{ !cancelled() }}
        with:
          check_name: "test report / ${{ matrix.emacs }}"
          report_paths: "test/go-ginkgo-test.xml"
