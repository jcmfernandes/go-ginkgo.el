version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current (and refresh the `# vX` comments).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "CI"
    groups:
      # One PR for all action bumps instead of one per action.
      actions:
        patterns:
          - "*"
